name: Export OpenClaw Browser
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Package
        run: |
          # 1. 强制拉取 amd64 平台的官方浏览器镜像
          docker pull --platform linux/amd64 ghcr.io/openclaw/browser:latest
          
          # 2. 将其重命名，方便你在极空间识别
          docker tag ghcr.io/openclaw/browser:latest openclaw-browser:latest
          
          # 3. 导出为 tar 文件
          docker save openclaw-browser:latest > browser_amd64.tar
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-browser-package
          path: browser_amd64.tar

name: Export Browser for OpenClaw
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Package
        run: |
          # 拉取微软官方的 Playwright 镜像（它是目前所有 AI Agent 的底层标配）
          docker pull --platform linux/amd64 mcr.microsoft.com/playwright:v1.40.0-jammy
          
          # 关键一步：把它重命名为 openclaw 要求的名字，这样你导入极空间后配置最省事
          docker tag mcr.microsoft.com/playwright:v1.40.0-jammy openclaw-browser:latest
          
          # 导出
          docker save openclaw-browser:latest > browser_amd64.tar
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-package
          path: browser_amd64.tar

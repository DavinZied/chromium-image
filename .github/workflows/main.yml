name: Export Real Browser
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Pull Image
        run: |
          # 拉取这个，它是专门为了“直接运行”设计的，内置了 3000 端口服务
          docker pull --platform linux/amd64 ghcr.io/browserless/chromium:latest
          # 把它重命名，方便你识别
          docker tag ghcr.io/browserless/chromium:latest browser:latest
          docker save browser:latest > browser_amd64.tar
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: browser-package
          path: browser_amd64.tar
